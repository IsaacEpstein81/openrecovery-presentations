<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>OpenRecovery Presentations</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f8fbfa;
      color: #073f46;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 72px 24px;
    }

    .kicker {
      color: #0b6f78;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 13px;
    }

    h1 {
      font-size: clamp(40px, 7vw, 72px);
      line-height: 1;
      letter-spacing: -0.055em;
      margin: 18px 0 18px;
    }

    p {
      color: #5e7377;
      font-size: 20px;
      line-height: 1.45;
      max-width: 720px;
    }

    .card {
      display: block;
      margin-top: 32px;
      padding: 28px;
      border-radius: 24px;
      background: white;
      border: 1px solid rgba(11, 111, 120, 0.16);
      box-shadow: 0 18px 45px rgba(7, 63, 70, 0.08);
      text-decoration: none;
      color: #073f46;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 55px rgba(7, 63, 70, 0.12);
    }

    .card h2 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.035em;
    }

    .card span {
      color: #0b6f78;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <main>
    <div class="kicker">OpenRecovery LMS Presentations</div>

    <h1>Training Slide Decks</h1>

    <p>
      Internal preview site for Reveal.js HTML5 course presentations.
    </p>

    <a
      class="card"
      href="./presentations/ethics-boundaries-recovery-counseling/lesson-01-understanding-professional-boundaries/"
    >
      <h2>1.1 Understanding Professional Boundaries</h2>
      <span>Ethics &amp; Boundaries in Recovery Counseling · 15 minutes</span>
    </a>
  </main>
</body>
</html>
